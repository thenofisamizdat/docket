name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & package (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Compile-check sources
        run: python -m compileall -q src

      - name: Build sdist + wheel
        run: python -m build

      - name: Validate package metadata
        run: twine check dist/*

      - name: Upload distribution artifacts
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: docket-dist
          path: dist/*
          if-no-files-found: error

  smoke:
    name: Install & import smoke test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download built wheel
        uses: actions/download-artifact@v4
        with:
          name: docket-dist
          path: dist

      - name: Install the wheel
        run: python -m pip install dist/*.whl

      - name: Scaffold a throwaway config and import the agent
        run: |
          python - <<'PY'
          import os, tempfile
          from pathlib import Path
          from docket_dev import config as C

          work = Path(tempfile.mkdtemp())
          cfg = C.Config(project_root=work, repo_slug="thenofisamizdat/docket")
          C.save_config(cfg)
          os.chdir(work)
          C.apply_env(C.load_config())

          import docket_dev.agent as A
          assert A.MODEL == "opus", A.MODEL
          assert A.STRONG_MODEL == "opus", A.STRONG_MODEL
          for fn in ("recover", "run_phase", "_recover_or_stall", "triage_prompt"):
              assert callable(getattr(A, fn)), fn

          from docket_dev import storage as S
          assert "queued" in S.TRANSITIONS["in_development"]
          assert {"needs_info", "queued"} <= S.TRANSITIONS["self_review"]
          print(f"smoke OK — docket-dev imports, MODEL={A.MODEL}, recovery router wired")
          PY
