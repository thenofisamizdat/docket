<!doctype html>
<!--
  Docket Roadmap — the 5-week waterfall board.

  A single self-contained page (no build step, matching how Docket ships its
  UI) served at /roadmap by app.py. Talks to /api/roadmap/* and shares the
  tester login with the main board (Bearer token, mirrored into the
  `testing_token` cookie the backend also accepts).

  Layout: Backlog | Week 1..N | Done, with an always-visible hours-to-completion
  counter and a burndown that reacts to bumps, scope injection, and completions.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Docket — Roadmap</title>
<style>
  :root{
    --bg:#0e1117; --panel:#161b24; --panel2:#1c2330; --line:#2a3345;
    --text:#e6ebf4; --dim:#8b96ab; --accent:#4f8cff; --ok:#3fb96a;
    --warn:#e0a83c; --bad:#e05252; --bump:#c069e8;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
       font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  header{display:flex;align-items:center;gap:18px;padding:14px 20px;
         border-bottom:1px solid var(--line);flex-wrap:wrap}
  header h1{font-size:17px;margin:0;font-weight:650;letter-spacing:.2px}
  header h1 span{color:var(--accent)}
  header select#epicFilter{background:var(--panel2);color:var(--text);border:1px solid var(--line);
    border-radius:8px;padding:6px 9px;font-size:12.5px;max-width:180px}
  .cycle-info{color:var(--dim);font-size:12.5px}
  .spacer{flex:1}
  .counter{background:var(--panel);border:1px solid var(--line);border-radius:10px;
           padding:7px 14px;text-align:center;min-width:118px}
  .counter b{display:block;font-size:20px;font-weight:700}
  .counter small{color:var(--dim);font-size:10.5px;text-transform:uppercase;letter-spacing:.6px}
  .counter.remaining b{color:var(--warn)}
  .counter.scope b{color:var(--accent)}
  .counter.done b{color:var(--ok)}
  button{background:var(--panel2);color:var(--text);border:1px solid var(--line);
         border-radius:8px;padding:7px 12px;cursor:pointer;font-size:13px}
  button:hover{border-color:var(--accent)}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff}

  #statStrip{display:flex;gap:10px;padding:12px 20px 0;flex-wrap:wrap}
  .acard{background:var(--panel);border:1px solid var(--line);border-radius:12px;
         padding:10px 16px;min-width:104px;text-align:center}
  .acard b{display:block;font-size:20px;font-weight:700}
  .acard small{color:var(--dim);font-size:10.5px;text-transform:uppercase;letter-spacing:.6px}
  .acard.health{display:flex;align-items:center;gap:12px;text-align:left;min-width:210px}
  .acard.health .gauge b{font-size:24px}
  .acard.health .hmeta b{font-size:14px;text-transform:capitalize}
  .acard.health .hmeta small{display:block;text-transform:none;letter-spacing:0;margin-top:2px}
  .health.ok{border-color:var(--ok)} .health.ok .gauge b{color:var(--ok)}
  .health.warn{border-color:var(--warn)} .health.warn .gauge b{color:var(--warn)}
  .health.bad{border-color:var(--bad)} .health.bad .gauge b{color:var(--bad)}
  #chartWrap{padding:10px 20px 0;display:flex;gap:10px;flex-wrap:wrap}
  #chartBox,#chartBox2{background:var(--panel);border:1px solid var(--line);border-radius:12px;
            padding:10px 14px 4px;flex:1;min-width:300px}
  #chartBox h3,#chartBox2 h3{margin:0 0 2px;font-size:12px;color:var(--dim);font-weight:600;
               text-transform:uppercase;letter-spacing:.6px}
  canvas{width:100%;height:150px;display:block}
  .legend{display:flex;gap:16px;font-size:11.5px;color:var(--dim);padding:4px 2px 6px}
  .key{display:inline-block;width:18px;height:3px;border-radius:2px;margin-right:5px;vertical-align:middle}

  #board{display:flex;gap:10px;padding:14px 20px 24px;overflow-x:auto;align-items:flex-start}
  .lane{background:var(--panel);border:1px solid var(--line);border-radius:12px;
        min-width:230px;width:230px;flex:0 0 auto;display:flex;flex-direction:column;max-height:calc(100vh - 320px)}
  /* epic view — a matrix: one ROW per epic, the week swimlanes as COLUMNS,
     cards at the (epic, week) intersections. */
  .viewtoggle{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .viewtoggle button{border:0;border-radius:0;padding:7px 12px;background:transparent}
  .viewtoggle button.active{background:var(--accent);color:#fff}
  #board.epics{display:block}
  .matrix{display:grid;gap:8px;min-width:max-content;align-items:stretch}
  .mx-corner,.mx-col{font-size:12px;color:var(--dim);padding:4px 6px 2px;font-weight:650}
  .mx-col .d{font-weight:400;font-size:10.5px}
  .mx-col.current{color:var(--accent)}
  .mx-epic{position:sticky;left:0;z-index:2;background:var(--panel);border:1px solid var(--line);
           border-radius:12px;border-top:3px solid var(--line);padding:10px 12px;align-self:stretch}
  .mx-corner{position:sticky;left:0;z-index:2;background:var(--bg)}
  .mx-cell{background:var(--panel);border:1px solid var(--line);border-radius:12px;
           min-height:64px;display:flex;flex-direction:column}
  .mx-cell.current{border-color:var(--accent)}
  .mx-cell.dragover{background:var(--panel2);border-color:var(--accent)}
  .mx-cell .cards{padding:6px;gap:6px;overflow:visible;min-height:0;flex:1}
  .mx-cell .empty{padding:8px 4px}
  .epic-stats{display:flex;gap:10px;margin-top:4px;font-size:11px;color:var(--dim)}
  .epic-stats b{color:var(--text);font-weight:650}
  .ebar{height:5px;border-radius:4px;background:var(--bg);overflow:hidden;margin-top:7px}
  .ebar i{display:block;height:5px;border-radius:4px}
  .card.child{margin-left:16px;border-left-width:2px}
  .pill.type{font-weight:650;text-transform:uppercase;letter-spacing:.4px;font-size:9.5px}
  /* assignee chip (initials) + people-view stat cards */
  .avatar{width:18px;height:18px;border-radius:50%;font-size:8.5px;font-weight:700;
          display:inline-flex;align-items:center;justify-content:center;cursor:pointer;
          background:var(--panel);border:1.5px solid var(--line);color:var(--dim);flex:0 0 auto}
  .avatar:hover{border-color:var(--accent);color:var(--text)}
  .avatar.unset{border-style:dashed}
  .udot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;vertical-align:baseline}
  #peopleStats{padding:0 20px;display:grid;gap:10px;margin-top:12px;
               grid-template-columns:repeat(auto-fill,minmax(290px,1fr))}
  .ucard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .ucard .uh{display:flex;align-items:center;gap:8px;font-weight:650;font-size:13.5px}
  .ucard .uh .ff{margin-left:auto;font-size:11px;font-weight:600}
  .ucard .ff.ok{color:var(--ok)} .ucard .ff.bad{color:var(--bad)} .ucard .ff.dim{color:var(--dim)}
  .ucard .unums{display:flex;gap:12px;margin:8px 0 2px;font-size:11px;color:var(--dim)}
  .ucard .unums b{display:block;font-size:15px;color:var(--text)}
  .ucard .urow{display:flex;gap:10px;align-items:flex-end;margin-top:8px}
  .ucard canvas{display:block}
  .ucard .utypes{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
  .assign-list{display:flex;flex-direction:column;gap:6px;max-height:280px;overflow:auto;margin-top:4px}
  .assign-list button{text-align:left;display:flex;align-items:center;gap:8px}
  .lane.current{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
  .lane.dragover{background:var(--panel2);border-color:var(--accent)}
  .lane-head{padding:10px 12px 8px;border-bottom:1px solid var(--line)}
  .lane-head .t{font-weight:650;font-size:13px}
  .lane-head .d{color:var(--dim);font-size:11px;margin-top:1px;display:flex;gap:8px;flex-wrap:wrap}
  .lane-head .now{color:var(--accent);font-weight:600}
  .cards{padding:8px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;min-height:60px}
  .card{background:var(--panel2);border:1px solid var(--line);border-radius:9px;
        padding:8px 10px;cursor:grab}
  .card:active{cursor:grabbing}
  .card .ref{font-size:10.5px;color:var(--dim);display:flex;justify-content:space-between;align-items:center}
  .card .title{font-size:12.8px;margin:3px 0 6px;font-weight:550;cursor:pointer}
  .card .title:hover{color:var(--accent)}
  .card .meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;font-size:10.5px}
  .pill{border-radius:20px;padding:1px 8px;border:1px solid var(--line);color:var(--dim)}
  .pill.P0{color:#fff;background:var(--bad);border-color:var(--bad)}
  .pill.P1{color:var(--bad);border-color:var(--bad)}
  .pill.P2{color:var(--warn);border-color:var(--warn)}
  .pill.status{color:var(--dim)}
  .pill.status.done{color:var(--ok);border-color:var(--ok)}
  .pill.bump{color:var(--bump);border-color:var(--bump);font-weight:700}
  .hours{margin-left:auto;font-weight:650;font-size:11.5px;cursor:pointer;color:var(--text)}
  .hours:hover{color:var(--accent)}
  .hours .rem{color:var(--warn)}
  .card.done-card{opacity:.75}
  .empty{color:var(--dim);font-size:11.5px;text-align:center;padding:14px 4px}

  /* overlays */
  .overlay{position:fixed;inset:0;background:rgba(8,10,15,.78);display:flex;
           align-items:center;justify-content:center;z-index:50}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;
         padding:26px;width:330px}
  .modal h2{margin:0 0 14px;font-size:16px}
  .modal label{display:block;color:var(--dim);font-size:11.5px;margin:10px 0 4px;
               text-transform:uppercase;letter-spacing:.5px}
  .modal input,.modal select,.modal textarea{width:100%;background:var(--bg);border:1px solid var(--line);
               color:var(--text);border-radius:8px;padding:8px 10px;font-size:13.5px;resize:vertical}
  .modal .fld{display:block;color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin:10px 0 4px}
  .modal .err{color:var(--bad);font-size:12px;min-height:16px;margin-top:8px}
  .modal button{width:100%;margin-top:12px}
  #toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
         background:var(--panel2);border:1px solid var(--line);border-radius:10px;
         padding:9px 16px;font-size:13px;display:none;z-index:60}

  /* interactive-card controls */
  .card .ref{display:flex;align-items:center;gap:6px}
  .grow{flex:1}
  .mini{background:var(--panel2);border:1px solid var(--line);color:var(--dim);
        border-radius:6px;padding:2px 7px;font-size:11px;cursor:pointer;line-height:1.4}
  .mini:hover{border-color:var(--accent);color:var(--text)}
  .mini.pipe{color:var(--accent);border-color:var(--accent)}
  select.rstatus{background:var(--bg);color:var(--text);border:1px solid var(--line);
        border-radius:6px;padding:2px 6px;font-size:11px;cursor:pointer}
  .meta.row2{margin-top:6px;display:flex;align-items:center}
  .doneh{color:var(--ok)}
  .pill.pipe-state{background:rgba(79,140,255,.14);border:1px solid var(--accent);color:var(--accent)}
  .modal.wide{width:min(580px,92vw)}
  .modal-btns{display:flex;gap:8px;margin-top:16px}
  .modal-btns button{width:auto;flex:1;margin-top:0}
  .tdetail{max-height:66vh;overflow:auto;margin-top:2px}
  .topen{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
  .topen a{color:var(--accent);text-decoration:none;font-size:12.5px}
  .topen a:hover{text-decoration:underline}
  .tsec{margin-bottom:12px}
  .tsec-h{color:var(--dim);font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
  .tcomment{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:8px;
            color:var(--text);padding:8px;font-size:13px;min-height:56px;resize:vertical}
  .tcomment-btn{margin-top:6px}
  .notes-list{max-height:none;overflow:visible;margin-top:0}
  .notes-list .note{border-top:1px solid var(--line);padding:8px 0}
  .notes-list .note-h{color:var(--dim);font-size:11px;margin-bottom:3px}
  .notes-list .note-b{font-size:12.5px;word-break:break-word;line-height:1.5}
  .md p{margin:0 0 6px} .md ul,.md ol{margin:4px 0 6px;padding-left:18px} .md li{margin:2px 0}
  .md h1,.md h2,.md h3{font-size:13px;font-weight:650;margin:8px 0 4px}
  .md code{background:var(--bg);border:1px solid var(--line);border-radius:4px;padding:1px 4px;font-size:11.5px}
  .md pre{background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:8px;overflow:auto;margin:6px 0}
  .md pre code{border:0;padding:0} .md a{color:var(--accent)} .md strong{font-weight:650}
  nav.nav{display:flex;gap:14px;margin-left:4px}
  nav.nav a{color:var(--dim);text-decoration:none;font-size:13px}
  nav.nav a:hover{color:var(--accent)}
  #board .lane .empty{color:var(--dim);font-size:12px;padding:14px 8px;text-align:center}

  .section-toggle{padding:12px 20px 2px;font-size:12px;color:var(--dim);text-transform:uppercase;
                  letter-spacing:.6px;cursor:pointer;user-select:none;font-weight:600}
  .section-toggle:hover{color:var(--text)}
  #analyticsBody.collapsed{display:none}
  #projectAnalytics{padding:10px 20px 0;display:flex;flex-direction:column;gap:10px}
  .pa-filters{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .pa-filters select{background:var(--bg);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:5px 8px;font-size:12px}
  .pa-filters .count{color:var(--dim);font-size:11.5px}
  .pa-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:720px){.pa-grid{grid-template-columns:1fr}}
  .pa-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .pa-card h4{margin:0 0 8px;font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
  .cmp{display:grid;grid-template-columns:1.4fr 1fr 1fr;font-size:13px}
  .cmp .h{font-size:11px;text-transform:uppercase;color:var(--dim);padding:3px 0;text-align:center}
  .cmp .h.auto{color:var(--accent)} .cmp .h.man{color:var(--text)}
  .cmp .r{padding:5px 0;border-top:1px solid var(--line)}
  .cmp .r.lbl{color:var(--dim)}
  .cmp .r.val{text-align:center;font-weight:600}
  .pa-bar{display:flex;align-items:center;gap:8px;font-size:12px;margin:4px 0}
  .pa-bar .l{width:96px;color:var(--dim);text-transform:capitalize;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pa-bar .t{flex:1;background:var(--bg);border-radius:4px;height:12px;overflow:hidden}
  .pa-bar .t i{display:block;height:12px;border-radius:4px}
  .pa-bar .n{width:54px;text-align:right;color:var(--dim)}
  /* full ticket view (board SPA embedded bare in an iframe) */
  #ticketOverlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;
                 align-items:center;justify-content:center;z-index:60}
  #ticketOverlay.open{display:flex}
  #ticketOverlay .tframe-wrap{position:relative;width:min(1150px,97vw);height:94vh}
  #ticketOverlay iframe{width:100%;height:100%;border:0;border-radius:12px;background:#fff}
  #ticketOverlay .tframe-x{position:absolute;top:10px;left:12px;z-index:2;
    background:rgba(15,23,42,.75);color:#fff;border:0;border-radius:8px;
    padding:5px 11px;font-size:12.5px;cursor:pointer}
</style>
</head>
<body>

<header>
  <h1>Docket <span>Roadmap</span></h1>
  <nav class="nav"><a href="/docket">← Board</a><a href="/build">Build</a></nav>
  <div class="viewtoggle" title="Organize the board by week lanes, by epic, or by person">
    <button id="viewWeeks" class="active">Weeks</button>
    <button id="viewEpics">Epics</button>
    <button id="viewPeople">People</button>
  </div>
  <div class="cycle-info" id="cycleInfo">—</div>
  <select id="epicFilter" title="Scope the whole page — lanes, burndown, analytics — to one epic">
    <option value="">All epics</option>
  </select>
  <div class="spacer"></div>
  <div class="counter remaining"><b id="hoursLeft">–</b><small>hrs to completion</small></div>
  <div class="counter scope"><b id="scopeTotal">–</b><small>hrs committed</small></div>
  <div class="counter done"><b id="hoursDone">–</b><small>hrs done</small></div>
  <button id="newTicketBtn" class="primary" title="Create a new ticket">+ New ticket</button>
  <button id="importBtn" title="Bulk import a whole plan (epics → stories → tasks/bugs) from a markdown file">⇪ Import plan</button>
  <button id="estimateBtn" title="Auto-estimate every ticket that has no estimate yet">✨ Auto-estimate</button>
  <button id="rolloverBtn" title="Bump everything unfinished in expired weeks into the current week">Roll over week</button>
  <button id="cycleBtn">New cycle…</button>
</header>

<div id="analyticsSection">
<div id="analyticsToggle" class="section-toggle"><span id="analyticsCaret">▾</span> Analytics</div>
<div id="analyticsBody">
<div id="statStrip">
  <div class="acard health" id="healthCard">
    <div class="gauge"><b id="healthScore">–</b><small>health</small></div>
    <div class="hmeta"><b id="healthLabel">—</b><small id="healthNote"></small></div>
  </div>
  <div class="acard"><b id="aSpent">–</b><small>hrs spent</small></div>
  <div class="acard"><b id="aLeft">–</b><small>hrs left</small></div>
  <div class="acard"><b id="aVelocity">–</b><small>hrs / week</small></div>
  <div class="acard"><b id="aForecast">–</b><small>forecast finish</small></div>
  <div class="acard"><b id="aCreep">–</b><small>scope injected</small></div>
</div>

<div id="chartWrap">
  <div id="chartBox">
    <h3>Burndown</h3>
    <canvas id="burndown" height="150"></canvas>
    <div class="legend">
      <span><i class="key" style="background:var(--dim)"></i>Ideal</span>
      <span><i class="key" style="background:var(--warn)"></i>Remaining</span>
      <span><i class="key" style="background:var(--accent);height:2px;border-bottom:2px dashed var(--accent);background:none"></i>Scope</span>
      <span><i class="key" style="background:var(--ok);height:2px;border-bottom:2px dashed var(--ok);background:none"></i>Projection</span>
      <span><i class="key" style="background:var(--bump)"></i>Bumps (ticks)</span>
    </div>
  </div>
  <div id="chartBox2">
    <h3>Week loading <small style="color:var(--dim);text-transform:none;letter-spacing:0">· committed hrs (▓ remaining)</small></h3>
    <canvas id="weekload" height="150"></canvas>
  </div>
</div>
<div id="projectAnalytics"></div>
</div><!-- analyticsBody -->
</div><!-- analyticsSection -->

<div id="peopleStats" style="display:none"></div>
<div id="board"></div>
<div id="toast"></div>

<!-- login -->
<div class="overlay" id="loginOverlay" style="display:none">
  <form class="modal" id="loginForm">
    <h2>Sign in to Docket</h2>
    <label>Username</label><input id="lu" autocomplete="username">
    <label>Password</label><input id="lp" type="password" autocomplete="current-password">
    <div class="err" id="loginErr"></div>
    <button class="primary" type="submit">Sign in</button>
  </form>
</div>

<!-- new cycle -->
<div class="overlay" id="cycleOverlay" style="display:none">
  <form class="modal" id="cycleForm">
    <h2>Start a cycle</h2>
    <label>Name</label><input id="cn" placeholder="Alpha push">
    <label>Start date (Monday)</label><input id="cs" type="date">
    <label>Weeks</label><input id="cw" type="number" value="5" min="1" max="12">
    <div class="err" id="cycleErr"></div>
    <button class="primary" type="submit">Create — lanes reset to Backlog</button>
    <button type="button" id="cycleCancel">Cancel</button>
  </form>
</div>

<!-- full ticket management view — the board SPA's TicketDetail, embedded bare -->
<div id="ticketOverlay">
  <div class="tframe-wrap">
    <button class="tframe-x" id="ticketClose">✕ Close</button>
    <iframe id="ticketFrame" src="about:blank" title="Ticket detail"></iframe>
  </div>
</div>

<script>
"use strict";
// Hub handoff: ?sso=<tester-jwt> from the service hub → adopt the session
// cookie and strip the params before the normal cookie read below.
(function(){
  const q = new URLSearchParams(location.search), t = q.get("sso");
  if (!t) return;
  document.cookie = "testing_token=" + t + "; path=/; max-age=" + 7*24*3600 + "; samesite=lax";
  q.delete("sso"); q.delete("name");
  history.replaceState(null, "", location.pathname + (q.toString() ? "?" + q.toString() : "") + location.hash);
})();
let TOKEN = null, BOARD = null, ANALYTICS = null, TICKETS = [], EPICS = [], USERS = null;
let EPIC = "";   // page-wide epic filter ("" = all) — scopes lanes, burndown, analytics
let VIEW = ["epics","people"].includes(localStorage.getItem("roadmap-view"))
  ? localStorage.getItem("roadmap-view") : "weeks";
let PAFILTER = {type:'all', source:'all', status:'all', assignee:'all', days:'all', epic:'all'};

/* ---------------- api ---------------- */
async function api(path, opts = {}) {
  opts.headers = Object.assign({"Content-Type": "application/json"},
    TOKEN ? {"Authorization": "Bearer " + TOKEN} : {}, opts.headers || {});
  const r = await fetch(path, opts);
  if (r.status === 401) { showLogin(); throw new Error("auth"); }
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.detail || r.statusText);
  return data;
}

function laneSum(cards){

  for (const c of cards){ est += c.estimate_hours || 0; rem += c.effective_remaining || 0; }

const epicColor = id => (id ? ((EPICS.find(e => e.id === +id) || {}).color || "#8b96ab") : "#8b96ab");

function drawWeekLoad(){
  const c = document.getElementById("weekload");
  const a = ANALYTICS;
  const dpr = window.devicePixelRatio || 1;
  const W = c.clientWidth || c.parentElement.clientWidth, H = 150;
  c.width = W * dpr; c.height = H * dpr;
  const g = c.getContext("2d"); g.scale(dpr, dpr); g.clearRect(0, 0, W, H);
  const wl = (a && a.week_load) || [];
  const byEpic = VIEW === "epics" && !EPIC;
  const byUser = VIEW === "people" && !EPIC;
  const h3 = document.querySelector("#chartBox2 h3");
  if (h3) h3.innerHTML = byEpic
    ? 'Week loading <small style="color:var(--dim);text-transform:none;letter-spacing:0">· committed hrs, stacked by epic</small>'
    : byUser
    ? 'Week loading <small style="color:var(--dim);text-transform:none;letter-spacing:0">· committed hrs, stacked by person</small>'
    : 'Week loading <small style="color:var(--dim);text-transform:none;letter-spacing:0">· committed hrs (▓ remaining)</small>';
  if (!wl.length){ g.fillStyle = "#8b96ab"; g.font = "12px sans-serif";
    g.fillText("Commit tickets to weeks to see loading.", 12, 24); return; }
  const padL = 30, padR = 10, padT = 10, padB = 18;
  const maxY = Math.max(1, ...wl.map(w => w.estimate));
  const py = v => padT + (H - padT - padB) * (1 - v / maxY);
  const bw = (W - padL - padR) / wl.length;
  // y gridlines
  g.strokeStyle = "#2a3345"; g.fillStyle = "#8b96ab"; g.font = "10px sans-serif"; g.lineWidth = 1;
  for (const f of [0, .5, 1]){ const y = py(maxY * f);
    g.beginPath(); g.moveTo(padL, y); g.lineTo(W - padR, y); g.stroke(); g.fillText(Math.round(maxY*f), 4, y+3); }
  wl.forEach((w, i) => {
    const x = padL + i * bw + 6, w2 = bw - 12;
    const yTop = py(w.estimate), yBase = py(0);
    if (byEpic || byUser){
      // Stack the week's committed estimate — one segment per epic (or person).
      const cards = (BOARD.lanes["w" + w.week] || []).filter(t => t.status !== "cancelled");
      const seg = {};
      for (const t of cards){
        const k = byEpic ? String(t.epic_id || 0) : (t.assignee || "");
        seg[k] = (seg[k] || 0) + (t.estimate_hours || 0);
      }
      let acc = 0;
      const ids = Object.keys(seg).sort((a2,b2) => seg[b2] - seg[a2]);
      for (const id of ids){
        const y0 = py(acc), y1 = py(acc + seg[id]);
        g.fillStyle = byEpic ? epicColor(id) : userColor(id);
        if (id === ids[ids.length - 1]) roundRectTop(g, x, y1, w2, y0 - y1, 4);
        else g.fillRect(x, y1, w2, y0 - y1);
        acc += seg[id];
      }
    } else {
      // committed estimate (accent, or red if overloaded), remaining overlaid darker
      g.fillStyle = w.overloaded ? "#e05252" : "#4f8cff";
      roundRectTop(g, x, yTop, w2, yBase - yTop, 4);
      g.fillStyle = "rgba(224,168,60,.55)";     // remaining portion
      const yRem = py(w.remaining);
      if (w.remaining > 0) roundRectTop(g, x, yRem, w2, yBase - yRem, 4);
    }
    g.fillStyle = w.is_current ? "#e6ebf4" : "#8b96ab";
    g.textAlign = "center";
    g.fillText("W" + w.week, x + w2/2, H - 5);
    if (w.estimate > 0) g.fillText(fmtH(w.estimate), x + w2/2, yTop - 3);
    g.textAlign = "left";
  });
}
function roundRectTop(g, x, y, w, h, r){
  if (h <= 0) return; r = Math.min(r, w/2, h);
  g.beginPath();
  g.moveTo(x, y + h); g.lineTo(x, y + r); g.arcTo(x, y, x + r, y, r);
  g.lineTo(x + w - r, y); g.arcTo(x + w, y, x + w, y + r, r);
  g.lineTo(x + w, y + h); g.closePath(); g.fill();
}

/* ---------------- project analytics (filter + automated-vs-manual, on the roadmap) ---------------- */
const paDone = (r) => r.status === "done" || r.roadmap_status === "done";
function paFilter(rows){
  const f = PAFILTER;
  return rows.filter(r => {
    if (f.type !== "all" && r.type !== f.type) return false;
    if (f.source === "automated" && !r.is_automated) return false;
    if (f.source === "manual" && r.is_automated) return false;
    if (f.status === "open" && paDone(r)) return false;
    if (f.status === "done" && !paDone(r)) return false;
    if (f.assignee !== "all" && (r.assignee || r.created_by || "") !== f.assignee) return false;
    if (f.epic === "none" ? r.epic_name : (f.epic !== "all" && r.epic_name !== f.epic)) return false;
    if (f.days !== "all" && (!r.created_at || Date.parse(r.created_at) < Date.now() - Number(f.days)*86400000)) return false;
    return true;
  });
}
function paAgg(rows){
  const done = rows.filter(paDone);
  const cyc = done.map(r => r.cycle_secs).filter(x => x != null);
  const vr = rows.filter(r => r.verified != null);
  const sum = k => rows.reduce((s,r) => s + (r[k]||0), 0);
  return {
    n: rows.length, done: done.length,
    avgCycle: cyc.length ? cyc.reduce((a,b)=>a+b,0)/cyc.length : null,
    cost: sum("cost_usd"), agentSecs: sum("agent_secs"), humanHrs: sum("hours_done"),
    verifiedPct: vr.length ? Math.round(rows.filter(r=>r.verified===true).length/vr.length*100) : null,
    reworkPct: rows.length ? Math.round(rows.filter(r=>r.iteration>0).length/rows.length*100) : 0,
  };
}
function fmtDur(secs){ if(!secs) return "–"; const h=secs/3600; return h>=1 ? h.toFixed(1)+"h" : Math.round(secs/60)+"m"; }
function fmtHrs(secs){ return secs ? (secs/3600).toFixed(1)+"h" : "0h"; }

function lane(id, title, sub, cards, isCurrent){
  const el = document.createElement("div");
  el.className = "lane" + (isCurrent ? " current" : "");

    el.addEventListener("drop", e => { e.preventDefault(); el.classList.remove("dragover"); onDrop(e, id); });
  }
  return el;
}

const RSTATUS = ["backlog", "todo", "in_progress", "done"];
const RSTATUS_LABEL = {backlog:"Backlog", todo:"To Do", in_progress:"In Progress", done:"Done"};
function isDone(t){ return t.roadmap_status === "done" || t.status === "done"; }

/* ---------------- epic view ---------------- */
/* One lane per epic. The lane owns the epic's color; every card inside is a
   shade of it — story strongest, task/feature lighter, bug lightest — so the
   whole epic reads as one color family at a glance. */
const TYPE_ALPHA = {story:.30, feature:.17, task:.17, bug:.09};
function shade(hex, a){
  const h = (hex || "#6366f1").replace("#","");
  const n = parseInt(h.length === 3 ? h.split("").map(c => c+c).join("") : h.slice(0,6), 16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}

function epicStats(cards){
  let est = 0, left = 0, done = 0;
  for (const c of cards){
    if (c.status === "cancelled") continue;
    est += c.estimate_hours || 0;
    done += c.hours_done || 0;
    if (!isDone(c)) left += c.effective_remaining ?? (c.estimate_hours || 0);
  }
  return {est, left, done, pct: est > 0 ? Math.max(0, Math.min(1, (est - left) / est)) : 0};
}

/* Hierarchy order: each story followed by its children (indented); open work
   before done; then parentless tasks/bugs; orphaned children fall back to
   top-level rather than vanishing. */
function epicOrder(cards){
  const byId = {}, kids = {};
  for (const c of cards) byId[c.id] = c;
  for (const c of cards) if (c.parent_id && byId[c.parent_id])
    (kids[c.parent_id] = kids[c.parent_id] || []).push(c);
  const top = cards.filter(c => !(c.parent_id && byId[c.parent_id]));
  const prio = p => ({P0:0, P1:1, P2:2, P3:3}[p] ?? 2);
  top.sort((a,b) => (isDone(a) - isDone(b)) || ((b.type === "story") - (a.type === "story"))
                    || (prio(a.priority) - prio(b.priority)) || (a.id - b.id));
  const out = [];
  for (const c of top){
    out.push({t: c, child: false});
    for (const k of (kids[c.id] || []).sort((a,b) => a.id - b.id))
      out.push({t: k, child: true});
  }
  return out;
}

/* The matrix: one ROW per group (epic or person; sticky header with
   effort/time-left), columns = Backlog | Week 1..N | Done. A card sits at
   (its group, its week). Dropping a card on a cell commits it to that week
   AND that group — epic in Epics view, assignee in People view. */
function allCards(){
  const all = [];
  for (const k in BOARD.lanes) for (const t of BOARD.lanes[k]) all.push(t);
  return all;
}

function matrixCols(){
  return [{id: "backlog", label: "Backlog", sub: "unscheduled"}]
    .concat((BOARD.weeks || []).map(w => ({id: "w" + w.week, label: "Week " + w.week,
                                           sub: `${w.start.slice(5)}→${w.end.slice(5)}`,
                                           current: w.is_current})))
    .concat([{id: "done", label: "Done", sub: "shipped"}]);
}

/* groups: [{name, color, cards, extra?, patch(ticket) -> body-or-null}] */
function buildMatrix(board, groups){
  if (!groups.length){
    board.innerHTML = `<div class="empty" style="padding:30px">Nothing to show yet — create tickets, or ⇪ Import plan.</div>`;
    return;
  }
  const cols = matrixCols();
  const mx = document.createElement("div");
  mx.className = "matrix";
  mx.style.gridTemplateColumns = `240px repeat(${cols.length}, 225px)`;
  const corner = document.createElement("div");
  corner.className = "mx-corner";
  mx.appendChild(corner);
  for (const c of cols){
    const h = document.createElement("div");
    h.className = "mx-col" + (c.current ? " current" : "");
    h.innerHTML = `${c.label}${c.current ? ' <span class="d">· current</span>' : ""} <span class="d">· ${c.sub}</span>`;
    mx.appendChild(h);
  }
  for (const g of groups){
    mx.appendChild(rowHead(g));
    for (const c of cols) mx.appendChild(matrixCell(g, c));
  }
  board.appendChild(mx);
}

/* Which column a ticket renders in — mirrors the weeks-view lane maths. */
function cellLane(t){
  if (t.status === "cancelled" && !t.week_lane) return "_hidden";
  if (isDone(t)) return "done";
  return t.week_lane ? "w" + t.week_lane : "backlog";
}

function rowHead(g){
  const s = epicStats(g.cards);
  const el = document.createElement("div");
  el.className = "mx-epic";
  el.style.borderTopColor = g.color;
  el.innerHTML = `
    <div class="t" style="font-weight:650;font-size:13px;color:${g.color}">${escapeHtml(g.name)}
      <span style="color:var(--dim);font-weight:400;font-size:11px"> · ${g.cards.length}</span></div>
    <div class="epic-stats">
      <span><b>${fmtH(s.est)}</b> est</span>
      <span><b style="color:var(--warn)">${fmtH(s.left)}</b> left</span>
      <span><b style="color:var(--ok)">${fmtH(s.done)}</b> done</span>
      <span style="margin-left:auto"><b>${Math.round(s.pct*100)}%</b></span>
    </div>
    <div class="ebar"><i style="width:${Math.round(s.pct*100)}%;background:${g.color}"></i></div>` +
    (g.extra || "");
  return el;
}

function matrixCell(g, col){
  const el = document.createElement("div");
  el.className = "mx-cell" + (col.current ? " current" : "");
  const wrap = document.createElement("div"); wrap.className = "cards";
  const cards = g.cards.filter(t => cellLane(t) === col.id);
  for (const {t, child} of epicOrder(cards))
    wrap.appendChild(card(t, col.id, {epicView: true, color: t.epic_color || g.color, child}));
  el.appendChild(wrap);
  if (col.id !== "done"){       // Done is lifecycle-driven, not drag-driven
    el.addEventListener("dragover", e => { e.preventDefault(); el.classList.add("dragover"); });
    el.addEventListener("dragleave", () => el.classList.remove("dragover"));
    el.addEventListener("drop", e => { e.preventDefault(); el.classList.remove("dragover");
                                       onDropCell(e, g, col.id); });
  }
  return el;
}

/* Drop on a matrix cell = commit to that (group, week) in one gesture. */
async function onDropCell(e, g, laneId){
  const id = parseInt(e.dataTransfer.getData("text/plain"), 10);
  if (!id) return;
  const t = findTicket(id);
  if (!t) return;
  const body = {};
  if (laneId === "backlog"){
    if (t.week_lane != null) body.week_lane = null;
  } else {
    const wk = parseInt(laneId.slice(1), 10);
    if (t.week_lane !== wk){
      body.week_lane = wk;
      if (t.estimate_hours == null){
        const est = prompt(`Estimate (hours) for ${t.ref} — required to enter a week:`);
        if (est === null) return;
        const v = parseFloat(est);
        if (isNaN(v) || v < 0) return toast("Estimate must be a number of hours");
        body.estimate_hours = v;
      }
    }
  }
  try {
    const patch = g.patch(t);           // epic_id / assignee change, or null
    if (patch)
      await api("/api/tickets/" + id, {method:"PATCH", body: JSON.stringify(patch)});
    if (Object.keys(body).length)
      await api("/api/roadmap/tickets/" + id, {method:"PATCH", body: JSON.stringify(body)});
    if (patch)
      toast(`${t.ref} → ${g.name}` + (body.week_lane ? ` · W${body.week_lane}` : ""));
    load();
  } catch(err){ toast(err.message); }
}

function drawSpark(c, series, col, cyc){
  const g = c.getContext("2d");
  const W = c.width, H = c.height;
  g.clearRect(0, 0, W, H);
  if (!series || !series.length || !cyc){
    g.fillStyle = "#8b96ab"; g.font = "9px sans-serif";
    g.fillText("burndown starts today", 2, H/2 + 3);
    return;
  }
  const day = 86400000;
  const x0 = new Date(cyc.start_date + "T00:00:00Z").getTime();
  const x1 = x0 + cyc.weeks * 7 * day;
  const maxY = Math.max(1, ...series.map(s => s.scope), ...series.map(s => s.remaining));
  const px = t => (W - 4) * Math.min(1, Math.max(0, (t - x0) / (x1 - x0))) + 2;
  const py = v => 3 + (H - 8) * (1 - v / maxY);
  const pts = series.map(s => ({t: new Date(s.date + "T00:00:00Z").getTime(), rem: s.remaining}));
  const now = Date.now();
  g.strokeStyle = col; g.lineWidth = 1.5; g.beginPath();
  pts.forEach((p, i) => {
    const x = px(p.t), y = py(p.rem);
    if (i) { g.lineTo(x, py(pts[i-1].rem)); g.lineTo(x, y); } else g.moveTo(x, y);
  });
  g.lineTo(px(Math.min(now, x1)), py(pts[pts.length-1].rem));
  g.stroke();
  const lx = px(Math.min(now, x1)), ly = py(pts[pts.length-1].rem);
  g.fillStyle = col; g.beginPath(); g.arc(lx, ly, 2, 0, Math.PI * 2); g.fill();
}

function drawUserWeeks(c, wl, col){
  const g = c.getContext("2d");
  const W = c.width, H = c.height;
  g.clearRect(0, 0, W, H);
  if (!wl || !wl.length) return;
  const maxY = Math.max(1, ...wl.map(w => w.estimate));
  const bw = W / wl.length;
  wl.forEach((w, i) => {
    const h = (H - 10) * (w.estimate / maxY);
    const x = i * bw + 2, w2 = Math.max(3, bw - 4);
    g.fillStyle = w.is_current ? col : shade(col, .35);
    if (w.estimate > 0) g.fillRect(x, H - 8 - h, w2, h);
    g.fillStyle = "#8b96ab"; g.font = "8px sans-serif"; g.textAlign = "center";
    g.fillText(w.week, x + w2/2, H - 1);
    g.textAlign = "left";
  });
}

/* minimal, XSS-safe markdown → HTML (escape first, then transform) */
function mdToHtml(src){
  let s = escapeHtml(src || "");
  s = s.replace(/```([\s\S]*?)```/g, (m,c) => `<pre><code>${c.replace(/^\n/,"")}</code></pre>`);
  s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
  s = s.replace(/^\s*### (.*)$/gm, "<h3>$1</h3>")
       .replace(/^\s*## (.*)$/gm, "<h2>$1</h2>")
       .replace(/^\s*# (.*)$/gm, "<h1>$1</h1>");
  s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  s = s.replace(/(?:^|\n)((?:\s*[-*] .*(?:\n|$))+)/g, (m,block) => {
    const items = block.trim().split(/\n/).map(l => `<li>${l.replace(/^\s*[-*] /,"")}</li>`).join("");
    return `\n<ul>${items}</ul>`;
  });
  return s.split(/\n{2,}/).map(b => {
    b = b.trim();
    if (!b) return "";
    return /^<(h\d|ul|ol|pre)/.test(b) ? b : `<p>${b.replace(/\n/g,"<br>")}</p>`;
  }).join("");
}

document.getElementById("newTicketBtn").addEventListener("click", () => {
  openModal("New ticket", `
    <label class="fld">Title</label><input id="ntTitle" placeholder="Short, specific title">
    <label class="fld">Type</label><select id="ntType"><option value="feature">Feature</option><option value="story">Story</option><option value="task">Task</option><option value="bug">Bug</option></select>
    <label class="fld">Priority</label><select id="ntPriority"><option>P0</option><option>P1</option><option selected>P2</option><option>P3</option></select>
    <label class="fld">Epic</label><select id="ntEpic"><option value="">— no epic</option>` +
    EPICS.map(e => `<option value="${e.id}"${String(e.id) === EPIC ? " selected" : ""}>${escapeHtml(e.name)}</option>`).join("") + `</select>
    <label class="fld">Description</label><textarea id="ntDesc" rows="3" placeholder="What & why"></textarea>
    <div class="err" id="ntErr"></div>`,
    [{label:"Cancel", cls:"", fn: closeModal}, {label:"Create", cls:"primary", fn: createTicket}]);
  setTimeout(() => document.getElementById("ntTitle")?.focus(), 30);
});
async function createTicket(){
  const title = document.getElementById("ntTitle").value.trim();
  if (!title){ document.getElementById("ntErr").textContent = "Title is required"; return; }
  const ep = document.getElementById("ntEpic").value;
  const body = { title, type: document.getElementById("ntType").value,
    priority: document.getElementById("ntPriority").value,
    epic_id: ep ? Number(ep) : null,
    description: document.getElementById("ntDesc").value };
  try {
    const d = await api("/api/tickets", {method:"POST", body:JSON.stringify(body)});
    closeModal(); toast(`${d.ticket.ref} created`); load();
  } catch(err){ document.getElementById("ntErr").textContent = err.message; }
}
/* ---------------- bulk plan import (markdown → epics/stories/tasks/bugs) ---------------- */
document.getElementById("importBtn").addEventListener("click", () => {
  openModal("Import a plan (markdown)", `
    <p style="color:var(--dim);margin:0 0 6px;font-size:12.5px">
      Paste (or upload) a roadmap document: <code>## Epic:</code> →
      <code>### Story:</code> → <code>#### Task:</code>/<code>#### Bug:</code>,
      with <code>Priority:</code>/<code>Estimate:</code> lines. Preview shows what
      will be created before anything is written.</p>
    <textarea id="impText" rows="10" style="font-family:ui-monospace,monospace;font-size:12px"
      placeholder="## Epic: Ingestion Reliability&#10;### Story: Resumable uploads survive restarts&#10;Priority: P1&#10;Estimate: 16h&#10;..."></textarea>
    <label class="mini" style="display:inline-block;margin-top:6px;cursor:pointer">upload .md file
      <input type="file" id="impFile" accept=".md,.markdown,text/markdown,text/plain" style="display:none"></label>
    <div id="impPreview" style="max-height:200px;overflow:auto;margin-top:8px;font-size:12px"></div>
    <div class="err" id="impErr"></div>`,
    [{label:"Cancel", cls:"", fn: closeModal},
     {label:"Preview", cls:"", fn: () => runImport(true)},
     {label:"Import", cls:"primary", fn: () => runImport(false)}], true);
  document.getElementById("impFile").addEventListener("change", e => {
    const f = e.target.files?.[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => { document.getElementById("impText").value = String(r.result); runImport(true); };
    r.readAsText(f);
  });
});

async function runImport(dryRun){
  const md = document.getElementById("impText")?.value || "";
  const errEl = document.getElementById("impErr"), prev = document.getElementById("impPreview");
  if (!md.trim()){ errEl.textContent = "Paste or upload a markdown plan first"; return; }
  errEl.textContent = "";
  try {
    const d = await api("/api/tickets/import", {method:"POST",
      body: JSON.stringify({markdown: md, dry_run: dryRun})});
    if (dryRun){
      const c = d.counts || {};
      prev.innerHTML =
        `<div style="margin-bottom:6px"><b>${c.epics||0}</b> epic(s) · <b>${c.story||0}</b> stories · ` +
        `<b>${c.task||0}</b> tasks · <b>${c.bug||0}</b> bugs · <b>${c.feature||0}</b> features · ` +
        `<b>${fmtH(c.estimated_hours||0)}</b> estimated</div>` +
        (d.warnings?.length ? `<div style="color:var(--warn);margin-bottom:6px">⚠ ${d.warnings.map(escapeHtml).join("<br>⚠ ")}</div>` : "") +
        d.tickets.map(t =>
          `<div style="padding:2px 0${t.parent ? ";padding-left:18px" : ""}">` +
          `<span class="pill type" style="margin-right:6px">${escapeHtml(t.type)}</span>` +
          `${escapeHtml(t.title)} <span style="color:var(--dim)">· ${escapeHtml(t.epic||"no epic")} · ` +
          `${t.priority}${t.estimate_hours ? " · " + fmtH(t.estimate_hours) : ""}</span></div>`).join("");
    } else {
      closeModal();
      toast(`Imported ${d.count} ticket(s) across ${d.epics.length} epic(s)` +
            (d.errors?.length ? ` — ${d.errors.length} failed` : ""));
      setView("epics");
      load();
    }
  } catch(err){ errEl.textContent = err.message; }
}

document.getElementById("estimateBtn").addEventListener("click", async () => {
  const n = unestimatedCount();
  if (!n) return toast("Every ticket already has an estimate");
  if (!confirm(`Auto-estimate ${n} unestimated ticket(s)? This asks Claude and may take a moment.`)) return;
  const btn = document.getElementById("estimateBtn");
  btn.disabled = true; btn.textContent = "✨ Estimating…";
  try {
    const d = await api("/api/roadmap/estimate", {method:"POST", body:JSON.stringify({})});
    toast(`Estimated ${d.count} ticket(s)`);
    load();
  } catch(err){ toast(err.message); }
  finally { btn.disabled = false; }
});

document.getElementById("cycleBtn").addEventListener("click", () => {
  document.getElementById("cs").value = new Date().toISOString().slice(0,10);
  document.getElementById("cycleOverlay").style.display = "flex";
});
document.getElementById("cycleCancel").addEventListener("click",
  () => document.getElementById("cycleOverlay").style.display = "none");
document.getElementById("cycleForm").addEventListener("submit", async e => {
  e.preventDefault();
  try {
    await api("/api/roadmap/cycle", {method:"POST", body:JSON.stringify({
      name: document.getElementById("cn").value,
      start_date: document.getElementById("cs").value,
      weeks: parseInt(document.getElementById("cw").value, 10) || 5 })});
    document.getElementById("cycleOverlay").style.display = "none";
    load();
  } catch(err){ document.getElementById("cycleErr").textContent = err.message; }
});

/* ---------------- burndown ---------------- */
function drawBurndown(){
  const c = document.getElementById("burndown");
  const dpr = window.devicePixelRatio || 1;
  const W = c.clientWidth || c.parentElement.clientWidth, H = 150;
  c.width = W * dpr; c.height = H * dpr;
  const g = c.getContext("2d"); g.scale(dpr, dpr); g.clearRect(0, 0, W, H);
  const cyc = BOARD.cycle;
  const byEpic = VIEW === "epics" && !EPIC && ANALYTICS && ANALYTICS.epic_series
                 && Object.keys(ANALYTICS.epic_series).length > 0;
  const byUser = VIEW === "people" && !EPIC && ANALYTICS && ANALYTICS.user_series
                 && Object.keys(ANALYTICS.user_series).length > 0;
  const h3b = document.querySelector("#chartBox h3");
  if (h3b) h3b.innerHTML = byEpic
    ? 'Burndown <small style="color:var(--dim);text-transform:none;letter-spacing:0">· one line per epic (colors match the rows)</small>'
    : byUser
    ? 'Burndown <small style="color:var(--dim);text-transform:none;letter-spacing:0">· one line per person (colors match the rows)</small>'
    : 'Burndown';
  if (!cyc){ g.fillStyle = "#8b96ab"; g.fillText("Start a cycle to see the burndown.", 12, 24); return; }

  const day = 86400000;
  const x0 = new Date(cyc.start_date + "T00:00:00Z").getTime();
  const x1 = x0 + cyc.weeks * 7 * day;
  // Under an epic filter the analytics payload is epic-scoped (snapshots are
  // cycle-global, so it comes back with none — ideal + projection only).
  const scoped = EPIC && ANALYTICS;
  const snaps = scoped ? (ANALYTICS.snapshots || []) : (BOARD.snapshots || []);
  const totScope = scoped ? ANALYTICS.totals.scope : BOARD.total_scope;
  const baseline = snaps.length ? snaps[0].total_scope : totScope;
  const maxY = Math.max(baseline, ...snaps.map(s => s.total_scope), totScope, 1);
  const padL = 34, padR = 10, padT = 8, padB = 18;
  const px = t => padL + (W - padL - padR) * Math.min(1, Math.max(0, (t - x0) / (x1 - x0)));
  const py = v => padT + (H - padT - padB) * (1 - v / maxY);

  // grid: week boundaries + y labels
  g.strokeStyle = "#2a3345"; g.fillStyle = "#8b96ab"; g.font = "10px sans-serif"; g.lineWidth = 1;
  for (let wkn = 0; wkn <= cyc.weeks; wkn++){
    const x = px(x0 + wkn * 7 * day);
    g.beginPath(); g.moveTo(x, padT); g.lineTo(x, H - padB); g.stroke();
    if (wkn < cyc.weeks) g.fillText("W" + (wkn + 1), x + 3, H - 6);
  }
  for (const f of [0, .5, 1]){
    const v = maxY * f, y = py(v);
    g.beginPath(); g.moveTo(padL, y); g.lineTo(W - padR, y); g.stroke();
    g.fillText(Math.round(v), 4, y + 3);
  }

  // ideal line: baseline scope → 0 across the cycle
  g.strokeStyle = "#8b96ab"; g.setLineDash([2, 3]); g.beginPath();
  g.moveTo(px(x0), py(baseline)); g.lineTo(px(x1), py(0)); g.stroke(); g.setLineDash([]);

  const pts = snaps.map(s => ({t: new Date(s.date + "T00:00:00Z").getTime(),
                               rem: s.total_remaining, scope: s.total_scope, bumps: s.bumps}));
  const now = Date.now();
  if (pts.length){
    // scope (dashed) — rises on injection
    g.strokeStyle = "#4f8cff"; g.setLineDash([5, 4]); g.lineWidth = 1.5; g.beginPath();
    pts.forEach((p, i) => { const x = px(p.t), y = py(p.scope); i ? g.lineTo(x, y) : g.moveTo(x, y); });
    g.lineTo(px(Math.min(now, x1)), py(pts[pts.length-1].scope)); g.stroke(); g.setLineDash([]);
    // remaining (solid, stepped)
    g.strokeStyle = "#e0a83c"; g.lineWidth = 2; g.beginPath();
    pts.forEach((p, i) => {
      const x = px(p.t), y = py(p.rem);
      if (i) { g.lineTo(x, py(pts[i-1].rem)); g.lineTo(x, y); } else g.moveTo(x, y);
    });
    g.lineTo(px(Math.min(now, x1)), py(pts[pts.length-1].rem)); g.stroke();
    // projection: extrapolate remaining → 0 at the current velocity (green dashed)
    const fc = ANALYTICS && ANALYTICS.forecast;
    const lastRem = pts[pts.length-1].rem;
    if (fc && fc.velocity_per_week > 0 && lastRem > 0){
      const weeksToZero = lastRem / fc.velocity_per_week;
      const tZero = Math.min(now, x1) + weeksToZero * 7 * day;
      g.strokeStyle = "#3fb96a"; g.setLineDash([5, 4]); g.lineWidth = 2; g.beginPath();
      g.moveTo(px(Math.min(now, x1)), py(lastRem));
      g.lineTo(px(tZero), py(0)); g.stroke(); g.setLineDash([]);
    }
    // bump ticks
    g.strokeStyle = "#c069e8"; g.lineWidth = 2;
    for (const p of pts) if (p.bumps > 0){
      const x = px(p.t);
      g.beginPath(); g.moveTo(x, padT); g.lineTo(x, padT + 7); g.stroke();
      g.fillStyle = "#c069e8"; g.fillText("↻" + p.bumps, x + 2, padT + 8); g.fillStyle = "#8b96ab";
    }
  } else if (scoped){
    // Epic-scoped with no rows yet: per-epic snapshots accumulate from the day
    // the epic first has week-lane tickets — mark current remaining + projection.
    const rem = ANALYTICS.totals.remaining, fc = ANALYTICS.forecast;
    const xNow = px(Math.min(now, x1));
    g.fillStyle = "#e0a83c"; g.beginPath(); g.arc(xNow, py(rem), 3, 0, Math.PI * 2); g.fill();
    if (fc && fc.velocity_per_week > 0 && rem > 0){
      const tZero = Math.min(now, x1) + (rem / fc.velocity_per_week) * 7 * day;
      g.strokeStyle = "#3fb96a"; g.setLineDash([5, 4]); g.lineWidth = 2; g.beginPath();
      g.moveTo(xNow, py(rem)); g.lineTo(px(tZero), py(0)); g.stroke(); g.setLineDash([]);
    }
    g.fillStyle = "#8b96ab";
    g.fillText("no history yet — this epic's burndown starts accumulating today", padL + 4, padT + 10);
  }

  // Grouped views, unfiltered: overlay one stepped remaining-line per group
  // (epic or person) in the same color as its row, so divergence is visible.
  const overlay = byEpic ? Object.entries(ANALYTICS.epic_series).map(([id, series]) =>
                    ({col: epicColor(id),
                      name: id === "0" ? "no epic" : ((EPICS.find(e => e.id === +id) || {}).name || ""),
                      series}))
                : byUser ? Object.entries(ANALYTICS.user_series).map(([nm, series]) =>
                    ({col: userColor(nm), name: nm || "unassigned", series}))
                : [];
  for (const {col, name, series} of overlay){
    if (!series.length) continue;
    const ep = series.map(s => ({t: new Date(s.date + "T00:00:00Z").getTime(), rem: s.remaining}));
    g.strokeStyle = col; g.lineWidth = 1.6; g.beginPath();
    ep.forEach((p, i) => {
      const x = px(p.t), y = py(p.rem);
      if (i) { g.lineTo(x, py(ep[i-1].rem)); g.lineTo(x, y); } else g.moveTo(x, y);
    });
    g.lineTo(px(Math.min(now, x1)), py(ep[ep.length-1].rem)); g.stroke();
    // endpoint dot + tiny label so lines are attributable without a legend
    const lx = px(Math.min(now, x1)), ly = py(ep[ep.length-1].rem);
    g.fillStyle = col; g.beginPath(); g.arc(lx, ly, 2.5, 0, Math.PI * 2); g.fill();
    if (name) g.fillText(name.slice(0, 14), Math.min(lx + 5, W - 60), ly - 3);
  }
}

window.addEventListener("resize", () => { if (BOARD){ drawBurndown(); drawWeekLoad(); } });
setInterval(() => TOKEN && load(), 30000);   // keep the counter honest
load();
</script>
