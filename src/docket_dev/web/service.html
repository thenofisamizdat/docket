<!doctype html>
<!--
  Docket Service — the multi-project control-plane dashboard.

  A single self-contained page (no build step) served at / by control_app.py.
  Talks to /api/service/* with a separate admin login (service_token cookie).
  Lists every registered project, launches/stops each, links out to each
  project's own board (/docket) and Run Full Build (/build) on its port, and
  creates new greenfield projects.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Docket — Service</title>
<style>
  :root{--bg:#0e1117;--panel:#161b24;--panel2:#1c2330;--line:#2a3345;
        --text:#e6ebf4;--dim:#8b96ab;--accent:#4f8cff;--ok:#3fb96a;--warn:#e0a83c;--bad:#e05252;--green:#2f6f4a;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
       font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  header{display:flex;align-items:center;gap:16px;padding:14px 22px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  header h1{font-size:17px;margin:0;font-weight:650}
  header h1 span{color:var(--accent)}
  .spacer{flex:1}
  a{color:var(--accent);text-decoration:none}
  button{background:var(--panel2);color:var(--text);border:1px solid var(--line);
         border-radius:8px;padding:7px 12px;cursor:pointer;font-size:13px}
  button:hover{border-color:var(--accent)}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  button.sm{padding:5px 10px;font-size:12px}
  .wrap{max-width:1000px;margin:0 auto;padding:22px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
  .card h3{margin:0 0 2px;font-size:15px}
  .meta{color:var(--dim);font-size:12px;margin-bottom:12px}
  .badge{display:inline-block;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;
         padding:2px 7px;border-radius:20px;border:1px solid var(--line);color:var(--dim)}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;background:var(--dim)}
  .dot.running{background:var(--ok)} .dot.stopped{background:var(--bad)} .dot.unknown{background:var(--warn)}
  .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  .actions a.btn{display:inline-block}
  .empty{color:var(--dim);padding:30px 0}
  .msg{padding:10px 14px;border-radius:8px;margin-bottom:14px;display:none}
  .msg.ok{background:rgba(63,185,106,.12);border:1px solid var(--ok);color:var(--ok);display:block}
  .msg.err{background:rgba(224,82,82,.12);border:1px solid var(--bad);color:var(--bad);display:block}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:24px;width:340px}
  .modal h2{margin:0 0 14px;font-size:16px}
  .modal label{display:block;font-size:12px;color:var(--dim);margin:10px 0 4px}
  .modal input,.modal select{width:100%;background:var(--panel2);border:1px solid var(--line);
               border-radius:7px;padding:8px;color:var(--text)}
  .modal .row{display:flex;gap:8px;margin-top:16px}
  .modal .row button{flex:1}
  .err{color:var(--bad);font-size:12px;min-height:16px;margin-top:6px}
</style>
</head>
<body>
<header>
  <h1>Docket<span>·</span>Service</h1>
  <div class="spacer"></div>
  <button id="refresh" class="sm">Refresh</button>
  <button id="newBtn" class="primary sm">+ New Project</button>
</header>

<div class="wrap">
  <div class="msg" id="msg"></div>
  <div class="grid" id="grid"></div>
</div>

<!-- login -->
<div class="overlay" id="loginOverlay" style="display:none">
  <form class="modal" id="loginForm">
    <h2>Docket Service — sign in</h2>
    <label>Username</label><input id="lu" autocomplete="username" value="admin">
    <label>Password</label><input id="lp" type="password" autocomplete="current-password">
    <div class="err" id="loginErr"></div>
    <button class="primary" type="submit" style="width:100%;margin-top:16px">Sign in</button>
  </form>
</div>

<!-- new project -->
<div class="overlay" id="newOverlay" style="display:none">
  <form class="modal" id="newForm">
    <h2>New greenfield project</h2>
    <label>Name</label><input id="np" placeholder="My App" autofocus>
    <label>Folder (optional)</label><input id="npath" placeholder="default: ./<slug>">
    <label>Dev mode</label>
    <select id="ndev">
      <option value="direct_main" selected>direct_main — commit to main, no PR</option>
      <option value="pr">pr — branch + PR</option>
      <option value="auto_merge">auto_merge — branch + PR, auto-merged</option>
    </select>
    <div class="err" id="newErr"></div>
    <div class="row">
      <button type="button" id="newCancel">Cancel</button>
      <button class="primary" type="submit">Create</button>
    </div>
    <div class="meta" style="margin-top:10px">Creates the folder + brief. Then fill in
      PROJECT_BRIEF.md and run <code>docket groom</code>.</div>
  </form>
</div>

<script>
"use strict";
let TOKEN = null;

async function api(path, opts = {}) {
  opts.headers = Object.assign({"Content-Type":"application/json"},
    TOKEN ? {"Authorization":"Bearer " + TOKEN} : {}, opts.headers || {});
  const r = await fetch(path, opts);
  if (r.status === 401) { showLogin(); throw new Error("auth"); }
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.detail || r.statusText);
  return data;
}
function showLogin(){ document.getElementById("loginOverlay").style.display="flex"; }
document.getElementById("loginForm").addEventListener("submit", async e => {
  e.preventDefault();
  try {
    const d = await api("/api/service/login", {method:"POST", body:JSON.stringify({
      username: document.getElementById("lu").value,
      password: document.getElementById("lp").value })});
    TOKEN = d.token;
    document.cookie = "service_token=" + TOKEN + "; path=/; max-age=" + 7*24*3600 + "; samesite=lax";
    document.getElementById("loginOverlay").style.display = "none";
    load();
  } catch(err){ document.getElementById("loginErr").textContent = "Invalid username or password"; }
});
(function(){ const m = document.cookie.match(/(?:^|;\s*)service_token=([^;]+)/); if (m) TOKEN = m[1]; })();

function esc(s){ return (s||"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function msg(txt, ok){ const m=document.getElementById("msg"); m.className="msg "+(ok?"ok":"err"); m.innerHTML=txt; }

async function load(){
  let d;
  try { d = await api("/api/service/projects"); } catch(e){ return; }
  const grid = document.getElementById("grid");
  const projects = d.projects || [];
  if (!projects.length){
    grid.innerHTML = '<div class="empty">No projects yet. Click <b>+ New Project</b>, or run <code>docket init</code> in a repo.</div>';
    return;
  }
  grid.innerHTML = projects.map(p => {
    const running = p.status === "running";
    const openBtns = running
      ? `<a class="btn" href="${esc(p.url)}/docket" target="_blank"><button class="sm">Board ↗</button></a>
         <a class="btn" href="${esc(p.url)}/build" target="_blank"><button class="sm">Run Build ↗</button></a>`
      : "";
    const toggle = running
      ? `<button class="sm" onclick="ctl('${esc(p.id)}','stop')">Stop</button>`
      : `<button class="primary sm" onclick="ctl('${esc(p.id)}','launch')">Launch</button>`;
    return `<div class="card">
      <h3>${esc(p.name)}</h3>
      <div class="meta"><span class="dot ${esc(p.status)}"></span>${esc(p.status)}
        · <span class="badge">${esc(p.kind)}</span>
        · :${esc(String(p.port))} · ${esc(p.dev_mode)}</div>
      <div class="actions">${toggle}${openBtns}</div>
    </div>`;
  }).join("");
}

async function ctl(id, action){
  try { const d = await api(`/api/service/projects/${id}/${action}`, {method:"POST", body:"{}"});
    msg(`${action === "launch" ? "Launched" : "Stopped"} ${id}.`, true); load();
  } catch(e){ msg(`Failed to ${action} ${id}: ${esc(e.message)}`, false); }
}

document.getElementById("newBtn").addEventListener("click", () => {
  document.getElementById("newOverlay").style.display = "flex";
});
document.getElementById("newCancel").addEventListener("click", () => {
  document.getElementById("newOverlay").style.display = "none";
});
document.getElementById("newForm").addEventListener("submit", async e => {
  e.preventDefault();
  const errEl = document.getElementById("newErr"); errEl.textContent = "Creating…";
  try {
    const d = await api("/api/service/projects", {method:"POST", body:JSON.stringify({
      name: document.getElementById("np").value,
      path: document.getElementById("npath").value,
      dev_mode: document.getElementById("ndev").value })});
    document.getElementById("newOverlay").style.display = "none";
    document.getElementById("newForm").reset();
    msg(`Created “${esc(d.project.name)}”. Fill in its PROJECT_BRIEF.md, then run <code>docket groom</code>.`, true);
    load();
  } catch(err){ errEl.textContent = err.message; }
});
document.getElementById("refresh").addEventListener("click", load);
load();
</script>
</body>
</html>
